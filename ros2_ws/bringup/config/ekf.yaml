ekf_filter_node:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    predict_to_current_time: true

    odom0: /diffbot_base_controller/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

#    odom1: /rtabmap/odom
#    odom1_config: [false, false, false,
#                   false, false, false,
#                   true, false, false,
#                   false, false, true,
#                   false, false, false]
#    odom1_differential: false
#    odom1_relative: false
#    odom1_queue_size: 10

    # ICP odometry disabled for the RealSense-gyro yaw experiment. Bag analysis
    # (2026-06-13) showed icp_odom was the WORST yaw source: 112-126 deg / 0.7-1.6 m
    # return-to-origin error in a corridor/symmetric apartment (scan-match
    # degeneracy). Re-enable only after the gyro-driven yaw baseline is validated.
    # odom2: /rtabmap/icp_odom
    # odom2_config: [false, false, false,
    #                false, false, true,
    #                true, false, false,
    #                false, false, true,
    #                false, false, false]
    # odom2_differential: false
    # odom2_relative: false
    # odom2_queue_size: 10

    imu0: /imu/data_body
    # RealSense gyro is the cleanest yaw source on this robot: low noise
    # (~0.0023 rad/s std) and bias-corrected integration returns to true heading
    # within ~4 deg over an 80 s multi-turn loop, vs 26-49 deg for wheel yaw.
    # Fuse its yaw RATE only -- NOT absolute yaw (unbounded without a usable
    # magnetometer). The residual ~0.002 rad/s (~7 deg/min) stationary bias is
    # cancelled by wheel vyaw, which reports exactly 0 when the robot is stopped.
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false

    imu1: /imu/external/data_body
    # The external IMU also shows absolute yaw drift even with magnetometer
    # enabled, and its residual gyro bias still drifts /odom. Keep it available
    # for RTAB-Map/diagnostics, but do not fuse it into EKF heading by default.
    imu1_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu1_differential: false
    imu1_relative: false
    imu1_queue_size: 20
    imu1_remove_gravitational_acceleration: false

ekf_filter_node:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    predict_to_current_time: true

    odom0: /diffbot_base_controller/odom
    # Wheel odom translation (vx) is good (~10% scale error), but its HEADING is
    # the dominant Layer-A error: yaw drifts 16-37 deg RMS vs the real path (ICP)
    # within a single run -> stop fusing wheel vyaw. Keep vx (forward speed) and
    # vy (structurally ~0 for a diff drive, constrains lateral slip).
    odom0_config: [false, false, false,
                   false, false, false,
                   true, true, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

#    odom1: /rtabmap/odom
#    odom1_config: [false, false, false,
#                   false, false, false,
#                   true, false, false,
#                   false, false, true,
#                   false, false, false]
#    odom1_differential: false
#    odom1_relative: false
#    odom1_queue_size: 10

    odom2: /rtabmap/icp_odom
    # ICP matches the real-world path (validated in rviz + agrees with the
    # RealSense gyro to 1-2 deg). Keep it as the absolute, drift-free pose/yaw
    # correction; the RealSense gyro (imu0) supplies smooth high-rate yaw between
    # ICP updates. Fuses absolute yaw + vx + vyaw.
    odom2_config: [false, false, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom2_differential: false
    odom2_relative: false
    odom2_queue_size: 10

    imu0: /imu/data_body
    # RealSense gyro is the best heading source on this robot: tracks the real
    # path (ICP) to 1-2 deg RMS, vs 16-37 deg for the wheels. Fuse its yaw RATE
    # only -- NOT absolute yaw (no usable magnetometer; gyro yaw is unbounded).
    # ICP (odom2) supplies the absolute, drift-free yaw correction and pins the
    # gyro's small ~7 deg/min bias at standstill. camera_imu_frame is identity-
    # rotated to base_footprint, so angular_velocity.z is true body yaw rate.
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false

    imu1: /imu/external/data_body
    # The external IMU also shows absolute yaw drift even with magnetometer
    # enabled, and its residual gyro bias still drifts /odom. Keep it available
    # for RTAB-Map/diagnostics, but do not fuse it into EKF heading by default.
    imu1_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu1_differential: false
    imu1_relative: false
    imu1_queue_size: 20
    imu1_remove_gravitational_acceleration: false

ekf_filter_node:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    predict_to_current_time: true

    odom0: /diffbot_base_controller/odom
    # Wheel odom translation (vx) is good (~10% scale error), but its HEADING is
    # the dominant Layer-A error: yaw drifts 16-37 deg RMS vs the real path (ICP)
    # within a single run -> stop fusing wheel vyaw. Keep vx (forward speed) and
    # vy (structurally ~0 for a diff drive, constrains lateral slip).
    odom0_config: [false, false, false,
                   false, false, false,
                   true, true, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # IMPORTANT: robot_localization reads odom0, odom1, odom2... CONSECUTIVELY and
    # STOPS at the first missing index. ICP MUST be odom1 (not odom2): previously
    # odom1 was commented out and ICP sat at odom2, so enumeration stopped after
    # odom0 and ICP was SILENTLY NOT FUSED. Confirmed live (the odom2 param did not
    # exist on the node) and in bags (EKF yaw == the raw gyro integral, drifting
    # ~7 deg/min, while ICP held heading to ~0.1 deg/20 s stationary). Keep sensor
    # indices gap-free: odom0 (wheel), odom1 (ICP).
    odom1: /rtabmap/icp_odom
    # ICP is fused as a DIFFERENTIAL source only: vx (idx6) + vyaw (idx11).
    # Its ABSOLUTE yaw (idx5) is intentionally NOT fused.
    #
    # Why abs-yaw is OFF (regression found in bag diffbot_cal_20260615_210752):
    # icp_odometry periodically loses tracking and RESETS (feature-poor lidar
    # geometry during rotation; icp_structural_complexity ~0.35). On those resets
    # its absolute yaw is corrupted -- in that bag it swept ~100 deg over 1.7 s
    # once, and froze at a fixed heading through a real turn another time -- yet
    # it keeps publishing that wrong yaw with tiny covariance (~1e-5). Because
    # abs-yaw is an ABSOLUTE constraint, the EKF obeyed it and abandoned the
    # CORRECT gyro+wheel heading: gyro and wheel INDEPENDENTLY agreed the robot
    # turned ~-100 deg, but ICP/EKF reported only -75 deg. That ~25 deg heading
    # error drove the robot into a wall. robot_localization cannot down-weight
    # ICP yaw selectively (ICP under-reports its covariance), so the only safe
    # fix is to stop fusing its absolute yaw. The earlier "stationary yaw drift
    # ~0" result came from this same abs-yaw pin -- it looked good standing still
    # but is dangerous under motion; it is NOT a true global reference.
    #
    # Absolute heading now comes from: gyro yaw RATE (imu0, short term) + rtabmap
    # map->odom loop closure (long-term absolute correction -- the architecturally
    # correct global reference, vs icp_odom which is itself drifting/resetting
    # odometry). Trade-off: residual gyro-bias drift returns when stationary
    # (partly suppressed by ICP vyaw~=0 when still) -- mitigate by recalibrating
    # the RealSense gyro, NOT by re-pinning EKF heading to icp_odom.
    #
    # History (independent of the above): icp_odom's old constant offset was
    # icp_odometry seeding its frame from the external IMU's absolute orientation
    # (wait_imu_to_init=true + mag). Fixed in diffbot.launch.py
    # (wait_imu_to_init=false) + external_imu_filter.yaml (use_mag=false) so icp
    # starts at base yaw 0. That seed fix stands and is why ICP vx/vyaw are clean.
    odom1_config: [false, false, false,
                   false, false, false,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 10

    imu0: /imu/data_body
    # RealSense gyro is the heading source: dead-reckoning wheel-vx + gyro-yaw
    # reproduced the SLAM-truth endpoint to ~0.08 m, vs 1.48 m for raw wheel.
    # Fuse its yaw RATE only -- NOT absolute yaw (no usable magnetometer; gyro
    # yaw is unbounded; rtabmap map->odom supplies absolute correction).
    # camera_imu_frame is identity-rotated to base_footprint, so
    # angular_velocity.z is true body yaw rate.
    # NOTE: residual gyro bias ~0.0019-0.0027 rad/s (~9 deg/min) is NOT removed
    # upstream -- recalibrate the RealSense gyro to minimize odom-frame yaw drift.
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false

    imu1: /imu/external/data_body
    # The external IMU also shows absolute yaw drift even with magnetometer
    # enabled, and its residual gyro bias still drifts /odom. Keep it available
    # for RTAB-Map/diagnostics, but do not fuse it into EKF heading by default.
    imu1_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu1_differential: false
    imu1_relative: false
    imu1_queue_size: 20
    imu1_remove_gravitational_acceleration: false

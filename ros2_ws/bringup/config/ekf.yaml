ekf_filter_node:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    predict_to_current_time: true

    odom0: /diffbot_base_controller/odom
    # Wheel odom translation (vx) is good (~10% scale error), but its HEADING is
    # the dominant Layer-A error: yaw drifts 16-37 deg RMS vs the real path (ICP)
    # within a single run -> stop fusing wheel vyaw. Keep vx (forward speed) and
    # vy (structurally ~0 for a diff drive, constrains lateral slip).
    odom0_config: [false, false, false,
                   false, false, false,
                   true, true, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # IMPORTANT: robot_localization reads odom0, odom1, odom2... CONSECUTIVELY and
    # STOPS at the first missing index. ICP MUST be odom1 (not odom2): previously
    # odom1 was commented out and ICP sat at odom2, so enumeration stopped after
    # odom0 and ICP was SILENTLY NOT FUSED. Confirmed live (the odom2 param did not
    # exist on the node) and in bags (EKF yaw == the raw gyro integral, drifting
    # ~7 deg/min, while ICP held heading to ~0.1 deg/20 s stationary). Keep sensor
    # indices gap-free: odom0 (wheel), odom1 (ICP).
    odom1: /rtabmap/icp_odom
    # ICP is fused with ABSOLUTE yaw (idx5) + vx (idx6) + vyaw (idx11).
    #
    # Why abs-yaw is ON -- it is REQUIRED for map quality, not optional:
    # rtabmap_slam builds the map from THIS EKF's /odom, NOT from icp_odom
    # directly (diffbot.launch.py rtabmap_remappings: ('odom','/odom')). So the
    # EKF heading IS the odometry the map is built on. For lidar/RGBD scans to
    # align in the map, that odometry must agree with the heading at which the
    # scans actually register -- i.e. ICP's heading. Pinning EKF yaw to ICP keeps
    # EKF == ICP, so scans align and the map is clean. Turning abs-yaw OFF was
    # TESTED (bag diffbot_cal_20260615_213202): EKF then followed the gyro and
    # diverged 25-37 deg from ICP mid-run -> scans placed at the wrong heading ->
    # ghosting / broken geometry. vyaw alone is NOT enough to keep EKF==ICP (gyro
    # dominates the rate); only the absolute-yaw pin holds them together.
    #
    # KNOWN RISK (do NOT "fix" by unpinning the EKF): when icp_odometry corrupts
    # its own heading on a reset (bag diffbot_cal_20260615_210752: lost tracking
    # during rotation -> yaw froze/swept -> ~25 deg error vs the gyro+wheel
    # consensus -> robot drove into a wall), this pin propagates that error into
    # navigation. Unpinning the EKF only trades the crash for a degraded map (see
    # above) -- both are band-aids on the SAME wound. The real fix is at the ICP
    # layer: stop icp_odometry from corrupting heading on resets / fast rotation
    # in feature-poor space (see icp_odometry_parameters in diffbot.launch.py:
    # Odom/ResetCountdown, motion guess, registration robustness).
    # robot_localization cannot down-weight ICP yaw selectively (ICP under-reports
    # its covariance ~1e-5 even when wrong), so the EKF cannot be the place that
    # distinguishes good ICP yaw from corrupted ICP yaw.
    #
    # Seed-offset history: icp_odom's old constant offset was icp_odometry seeding
    # its frame from the external IMU's absolute orientation (wait_imu_to_init=
    # true + mag). Fixed in diffbot.launch.py (wait_imu_to_init=false) +
    # external_imu_filter.yaml (use_mag=false) so icp starts at base yaw 0. That
    # fix is why fusing ICP absolute yaw is valid (icp_odom shares the base frame).
    # ROTATION-RATE HANDOFF TO THE GYRO (2026-06-17, bag diffbot_latest_2 analysis).
    # icp's vyaw (idx11) was being fused, but icp is BLIND to its own rotational
    # error: its reported covariance is a single scalar on a fixed diagonal (yaw
    # variance == 0.1x x variance, ALWAYS), and its quality signals
    # (structural_complexity, inliers_ratio) do NOT degrade during spins -- it
    # finds good correspondences at a slightly-wrong rotation on self-similar
    # walls and reports high confidence anyway. The RealSense gyro (imu0 idx11,
    # 198 Hz) measures true rotation RATE from physics, independent of scan
    # geometry, so it is the reliable spin-time source. So: STOP fusing icp vyaw
    # (idx11 true->false) and let the gyro be the SOLE rotation-rate source. icp
    # KEEPS absolute yaw (idx5) as the slow drift anchor + vx (idx6).
    odom1_config: [false, false, false,
                   false, false, true,
                   true, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 10
    # MAHALANOBIS REJECTION GATE -- "icp yaw has lower confidence during spins",
    # implemented as rejection. The EKF compares each icp pose against its own
    # prediction (now driven by the honest gyro rate) using the innovation
    # covariance; if icp's absolute yaw disagrees beyond this many sigma -- exactly
    # what happens when icp under-counts a spin while the gyro got it right -- the
    # measurement is REJECTED. When icp agrees (stable driving), it is accepted and
    # corrects drift. This is NOT the unpinning warned about above (which dropped
    # abs-yaw entirely -> gyro drift -> ghosting): the pin stays fully active
    # whenever icp is trustworthy; only demonstrably-wrong spin readings are
    # dropped. THIS IS THE KEY TUNING KNOB: too low rejects good corrections (drift
    # returns), too high never fires (no effect). Start at 5.0 sigma; watch the EKF
    # debug for rejected measurements during spins vs straight driving and adjust.
    odom1_pose_rejection_threshold: 5.0

    imu0: /imu/data_body
    # RealSense gyro is the heading source: dead-reckoning wheel-vx + gyro-yaw
    # reproduced the SLAM-truth endpoint to ~0.08 m, vs 1.48 m for raw wheel.
    # Fuse its yaw RATE only -- NOT absolute yaw (no usable magnetometer; gyro
    # yaw is unbounded; rtabmap map->odom supplies absolute correction).
    # camera_imu_frame is identity-rotated to base_footprint, so
    # angular_velocity.z is true body yaw rate.
    # NOTE: residual gyro bias ~0.0019-0.0027 rad/s (~9 deg/min) is NOT removed
    # upstream -- recalibrate the RealSense gyro to minimize odom-frame yaw drift.
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false

    # External ICM-20948 IMU (/imu/external/data_body) is DELIBERATELY NOT a
    # sensor here. It is the worse source (gyro std ~0.029 rad/s + vibration
    # spikes, madgwick absolute yaw drift 30-81 deg, magnetometer unusable
    # indoors) and is not fused anywhere in the stack as of 2026-06-15 -- the
    # whole SLAM layer was moved to the RealSense IMU too (see diffbot.launch.py).
    # Its raw topics (/imu/data_raw, /imu/mag) still publish for future mag
    # calibration; re-add an imuN sensor here only if it is calibrated and proven
    # better than the RealSense gyro on some axis. Note robot_localization stops
    # enumerating imu0,imu1,... at the first gap, so any re-add must be imu1.

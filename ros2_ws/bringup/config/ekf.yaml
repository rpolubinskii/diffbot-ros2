ekf_filter_node:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    predict_to_current_time: true

    odom0: /diffbot_base_controller/odom
    # Wheel odom translation (vx) is good (~10% scale error), but its HEADING is
    # the dominant Layer-A error: yaw drifts 16-37 deg RMS vs the real path (ICP)
    # within a single run -> stop fusing wheel vyaw. Keep vx (forward speed) and
    # vy (structurally ~0 for a diff drive, constrains lateral slip).
    odom0_config: [false, false, false,
                   false, false, false,
                   true, true, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

#    odom1: /rtabmap/odom
#    odom1_config: [false, false, false,
#                   false, false, false,
#                   true, false, false,
#                   false, false, true,
#                   false, false, false]
#    odom1_differential: false
#    odom1_relative: false
#    odom1_queue_size: 10

    odom2: /rtabmap/icp_odom
    # ICP scan-matching is good odometry and IS fused (absolute yaw + vx + vyaw).
    # Fusing its ABSOLUTE yaw is only valid because icp_odom now starts at yaw 0
    # in the base frame -- see the constant-offset root cause below.
    # ROOT CAUSE of the old constant offset: icp_odometry ran with
    # wait_imu_to_init=True and seeded its whole output frame from the external
    # IMU's ABSOLUTE orientation at startup. That orientation's zero is
    # (magnetic north | gyro-init) + the -90 deg imu_link mount, none of which
    # is the odom frame -> icp_odom was born rotated by a constant. Measured:
    # icp's FIRST message == /imu/external/data_body to <0.1 deg, stationary,
    # from t=0 (mag on: -128.7 deg; mag off: ~-80 deg). It was NOT drift.
    # Two-part fix: (1) external_imu_filter.yaml use_mag=false removed the
    # magnetic-north part; (2) diffbot.launch.py icp_odometry wait_imu_to_init=
    # false drops the absolute-yaw seed entirely so icp starts at base yaw 0.
    # ICP's scan-matched rotation was always correct -- only the seed was bad.
    odom2_config: [false, false, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom2_differential: false
    odom2_relative: false
    odom2_queue_size: 10

    imu0: /imu/data_body
    # RealSense gyro is the heading source: dead-reckoning wheel-vx + gyro-yaw
    # reproduced the SLAM-truth endpoint to ~0.08 m, vs 1.48 m for raw wheel.
    # Fuse its yaw RATE only -- NOT absolute yaw (no usable magnetometer; gyro
    # yaw is unbounded; rtabmap map->odom supplies absolute correction).
    # camera_imu_frame is identity-rotated to base_footprint, so
    # angular_velocity.z is true body yaw rate.
    # NOTE: residual gyro bias ~0.0019-0.0027 rad/s (~9 deg/min) is NOT removed
    # upstream -- recalibrate the RealSense gyro to minimize odom-frame yaw drift.
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false

    imu1: /imu/external/data_body
    # The external IMU also shows absolute yaw drift even with magnetometer
    # enabled, and its residual gyro bias still drifts /odom. Keep it available
    # for RTAB-Map/diagnostics, but do not fuse it into EKF heading by default.
    imu1_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu1_differential: false
    imu1_relative: false
    imu1_queue_size: 20
    imu1_remove_gravitational_acceleration: false

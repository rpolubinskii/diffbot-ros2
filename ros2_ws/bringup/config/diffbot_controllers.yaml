controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diffbot_base_controller:
      type: diff_drive_controller/DiffDriveController

diffbot_base_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.2
    wheels_per_side: 1  # actually 2, but both are controlled by 1 signal
    wheel_radius: 0.036

    # Wheel calibration 2026-06-14 (bags diffbot_icpfix_*_straight and *_rotation_{cw,ccw}):
    #   radius: 3 m straight drive, encoders Δφ L=79.19 / R=76.97 rad vs measured ground
    #     L=3.00 / R=2.965 m  ->  true radius ~0.0382 m (was 0.0393, ~2.8% high). Odom
    #     had over-reported distance (computed 3.11/3.03 m). Kept SYMMETRIC: the ~1.7%
    #     L/R radius split is within hand-measurement noise (3.5 cm diff over 3 m).
    #   separation: 2x360 deg in-place spins, physical 735/737 deg while wheel odom read
    #     ~720 (under by ~2.3%); with the calibrated radius -> ~0.238 m (was 0.250).
    # NOTE: the LEFT wheel spins ~2.9% more than the right for a straight command (motor/
    #   control asymmetry; ~19% in spin -> direction-dependent), so the robot veers and
    #   wheel-only heading is unreliable (read -20 deg on a straight run vs ~-4 deg true).
    #   This is why ekf.yaml does NOT fuse wheel vyaw -- a single radius multiplier cannot
    #   correct a direction-dependent asymmetry, so it is documented, not "calibrated out".
    #   radius mainly matters here because the EKF DOES fuse wheel vx (forward speed).
    wheel_separation_multiplier: 1.190    # eff 0.238 m (0.2 x 1.190)
    left_wheel_radius_multiplier: 1.0611  # eff 0.0382 m (0.036 x 1.0611)
    right_wheel_radius_multiplier: 1.0611 # eff 0.0382 m

    publish_rate: 50.0
    # was base_link
    base_frame_id: base_footprint
    odom_frame_id: odom
    pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    use_stamped_vel: false
    open_loop: false
    position_feedback: true
    cmd_vel_timeout: 0.5
    enable_odom_tf: false

    #publish_limited_velocity: true
    #velocity_rolling_window_size: 10

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    linear.x.has_velocity_limits: false
    linear.x.has_acceleration_limits: false
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0
    linear.x.max_acceleration: 1.0
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: false
    angular.z.has_acceleration_limits: false
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
    angular.z.max_acceleration: 1.0
    angular.z.min_acceleration: -1.0
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0

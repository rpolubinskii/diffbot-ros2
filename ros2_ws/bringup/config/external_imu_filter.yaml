external_imu_filter:
  ros__parameters:
    stateless: false
    # Magnetometer fusion DISABLED. The indoor field is badly disturbed: |B|~95 uT
    # (~2x earth's ~50 uT) and swings 60-117 uT across a run (position-dependent
    # soft-iron from rebar/motors/appliances), and hard-iron was never calibrated.
    # With use_mag=true the madgwick filter referenced heading to this bogus
    # "magnetic north", giving the external IMU (and icp_odometry, which inits its
    # heading from it) a ~120 deg offset vs the robot/odom frame. Gyro-only means
    # the filter initializes yaw at 0 in the robot frame. Re-enable only if a
    # reliable, calibrated heading reference becomes available.
    use_mag: false
    publish_tf: false
    reverse_tf: false
    fixed_frame: odom
    constant_dt: 0.0
    publish_debug_topics: false
    world_frame: enu
    gain: 0.05
    zeta: 0.0
    mag_bias_x: 0.0
    mag_bias_y: 0.0
    mag_bias_z: 0.0
    orientation_stddev: 0.03
